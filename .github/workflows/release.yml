name: Android Release Build

on:
  push:
    tags:
      - "[0-9]*"     

permissions:
  contents: write     

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Prepare build files
        run: |
          set -euo pipefail

          mkdir -p app/src/plus app/src/zh

          echo "${{ secrets.GOOGLE_SERVICES_JSON_B64_PLUS }}" | base64 -d > app/src/plus/google-services.json
          test -s app/src/plus/google-services.json

          echo "${{ secrets.GOOGLE_SERVICES_JSON_B64_ZH }}" | base64 -d > app/src/zh/google-services.json
          test -s app/src/zh/google-services.json

          if [ -n "${{ secrets.KEY_BASE64 }}" ]; then
            echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key
          fi

          if [ -n "${{ secrets.SIGNING_CONFIG }}" ]; then
            echo "${{ secrets.SIGNING_CONFIG }}" > local.properties
          fi

      - name: Gradle Build Release
        run: |
          set -euo pipefail
          chmod +x gradlew

          echo "Building release APK..."
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Upload build output (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/**/release/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/**/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
