name: Build APK (Debug/Release)

on:
  workflow_dispatch:
    inputs:
      build:
        description: "Choose what to build"
        required: true
        type: choice
        default: both
        options:
          - debug
          - release
          - both

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Prepare build files
        shell: bash
        run: |
          set -euo pipefail

          # google-services.json（如果项目需要）
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          fi

          # 只有构建 release 或 both 时才准备签名文件
          if [ "${{ inputs.build }}" = "release" ] || [ "${{ inputs.build }}" = "both" ]; then
            # 解码 base64 keystore
            echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key

            # 写入签名配置到 local.properties（按你项目当前的读取方式保留）
            echo "${{ secrets.SIGNING_CONFIG }}" > local.properties
          fi

      - name: Gradle Build
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew

          if [ "${{ inputs.build }}" = "debug" ]; then
            ./gradlew :app:assembleDebug --no-daemon --stacktrace
          elif [ "${{ inputs.build }}" = "release" ]; then
            ./gradlew :app:assembleRelease --no-daemon --stacktrace
          else
            ./gradlew :app:assembleDebug :app:assembleRelease --no-daemon --stacktrace
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: ${{ inputs.build == 'debug' || inputs.build == 'both' }}
        with:
          name: apk-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: ${{ inputs.build == 'release' || inputs.build == 'both' }}
        with:
          name: apk-release
          path: app/build/outputs/apk/release/*.apk
